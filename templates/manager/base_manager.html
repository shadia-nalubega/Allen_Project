<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyondo Stock</title>

    <link rel="stylesheet"
    href="https://unpkg.com/@phosphor-icons/web">

    <style>

        :root {
            --sidebar-gradient:
            linear-gradient(235deg, #0B1F3A, #1ABC9C);

            --body-bg: #f8fafc;

            --text-dark: #1e293b;

            --text-muted: #64748b;

            --card-shadow:
            0 4px 6px -1px rgba(0,0,0,0.05);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter', sans-serif;
        }

        body{
            background:var(--body-bg);
        }

        .dashboard-container{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:260px;
            background:var(--sidebar-gradient);
            color:white;
            padding:24px;
            display:flex;
            flex-direction:column;
        }

        .logo-section{
            margin-bottom:40px;
        }

        .nav-menu{
            flex-grow:1;
        }

        .nav-item{
            display:flex;
            align-items:center;
            gap:12px;
            padding:14px;
            margin-bottom:10px;
            text-decoration:none;
            color:white;
            border-radius:10px;
            transition:0.3s;
        }

        .nav-item:hover{
            background:rgba(255,255,255,0.1);
        }

        .main-content{
            flex-grow:1;
            padding:40px;
        }

        .card{
            background:white;
            border-radius:18px;
            padding:24px;
            box-shadow:var(--card-shadow);
        }

    </style>

</head>
<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="logo-section">
            <h2>NyondoStock</h2>
            <p>STOCK MANAGER</p>
        </div>

        <nav class="nav-menu">

            <a href="#" class="nav-item">
                <i class="ph ph-squares-four"></i>
                Dashboard
            </a>

            <a href="{% url 'product-list' %}" class="nav-item">
                <i class="ph ph-package"></i>
                Products
            </a>

            <a href="{% url 'register_stock' %}" class="nav-item">
                <i class="ph ph-plus-circle"></i>
                Register Stock
            </a>

            <a href="#" class="nav-item">
                <i class="ph ph-warning-circle"></i>
                Low Stock
            </a>

            <a href="#" class="nav-item">
                <i class="ph ph-trend-up"></i>
                Reports
            </a>

        </nav>

    </aside>

    <main class="main-content">

        {% block content %}

        {% endblock %}

    </main>

</div>

</body>
</html>
